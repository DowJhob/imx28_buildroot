# Minimal SD card image for the Acmesystems Arietta G25

image boot.vfat {
	vfat {
		file zImage {
			image = "zImage"
		}
		
		file imx28-tionpro28.dtb {
			image = "at91-ariettag25.dtb"
		}
		
		file boot.bin {
			image = "zImage.bin"
		} 
	}
	size = 40M
}

image sdcard.img {
	hdimage {
	}

	partition boot {
		partition-type = 0xC
		bootable = "true"
		image = "boot.vfat"
	}

	partition rootfs {
		partition-type = 0x83
		image = "rootfs.ext4"
		size = 200M
	}
}
